services:
  api:
    build: .
    env_file: .env
    command: uvicorn app.publication_extensions:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - workspaces:/app/workspaces
      - codex_auth:/root/.codex:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    env_file: .env
    command: celery -A app.tasks.celery_app worker -Q generation --loglevel=INFO --concurrency=1 --prefetch-multiplier=1
    restart: unless-stopped
    volumes:
      - .:/app
      - workspaces:/app/workspaces
      - codex_auth:/root/.codex
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  audit-worker:
    build: .
    env_file: .env
    command: celery -A app.tasks.celery_app worker -Q celery --loglevel=INFO --concurrency=1 --prefetch-multiplier=1
    restart: unless-stopped
    volumes:
      - .:/app
      - workspaces:/app/workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build: .
    env_file: .env
    command: celery -A app.tasks.celery_app beat --loglevel=INFO
    restart: unless-stopped
    volumes:
      - .:/app
    depends_on:
      - worker
      - audit-worker

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: localsite
      POSTGRES_USER: localsite
      POSTGRES_PASSWORD: localsite
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localsite -d localsite"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  workspaces:
  codex_auth:
