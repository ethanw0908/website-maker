services:
  api:
    build: .
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - workspaces:/app/workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    env_file: .env
    command: celery -A app.tasks.celery_app worker --loglevel=INFO --concurrency=2
    volumes:
      - .:/app
      - workspaces:/app/workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build: .
    env_file: .env
    command: celery -A app.tasks.celery_app beat --loglevel=INFO
    volumes:
      - .:/app
    depends_on:
      - worker

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: localsite
      POSTGRES_USER: localsite
      POSTGRES_PASSWORD: localsite
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localsite -d localsite"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  workspaces:
